<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>F1 Telemetry: Brake Calculator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 40px; }
        .calc-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 450px; border-top: 6px solid #e10600; }
        h2 { color: #1a1a1a; margin-top: 0; text-transform: uppercase; font-size: 1.2em; letter-spacing: 1px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        .results { margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1.1em; }
        .res-item span:last-child { font-weight: bold; color: #e10600; }
        .note { font-size: 0.85em; color: #777; line-height: 1.4; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Инженерный калькулятор F1</h2>
    
    <label>Масса болида с пилотом (кг):</label>
    <input type="number" id="mass" value="798" step="1" oninput="calc()">

    <label>Начальная скорость (км/ч):</label>
    <input type="number" id="speed" value="330" step="1" oninput="calc()">

    <div class="results">
        <div class="res-item">
            <span>Кинетическая энергия:</span>
            <span id="ek">0 МДж</span>
        </div>
        <div class="res-item">
            <span>Тормозной путь:</span>
            <span id="dist">0 м</span>
        </div>
        <div class="res-item">
            <span>Пиковая перегрузка:</span>
            <span id="gforce">0 G</span>
        </div>
        <div class="res-item">
            <span>Время торможения:</span>
            <span id="time">0 сек</span>
        </div>
    </div>

    <p class="note">
        *Расчет учитывает прогретые карбоновые диски (μ ≈ 1.5) и аэродинамическое замедление. 
        Прижимная сила рассчитана для стандартного пакета настроек.
    </p>
</div>

<script>
function calc() {
    // Вводные данные
    const m = parseFloat(document.getElementById('mass').value); // кг
    const v_kmh = parseFloat(document.getElementById('speed').value); // км/ч
    const v0 = v_kmh / 3.6; // перевод в м/с
    
    if (!m || !v0) return;

    // 1. Кинетическая энергия (E = mv²/2)
    const ek = (m * Math.pow(v0, 2)) / 2;
    document.getElementById('ek').innerText = (ek / 1000000).toFixed(2) + " МДж";

    // 2. Физика замедления (нелинейная модель)
    // В F1 общее замедление = замедление от тормозов + аэродинамическое сопротивление
    // Пиковое замедление в начале торможения на 300+ км/ч достигает 5-5.5G
    // Коэффициент трения карбона по карбону μ может достигать 1.5 - 1.8 при прогреве.
    
    const g = 9.81;
    const mu = 1.6; // Эффективный коэфф. трения с учетом прижимной силы
    
    // Пиковая перегрузка (на высокой скорости помогает аэродинамика)
    // Формула: a = (F_торм + F_аэро) / m
    // Для упрощения возьмем эмпирическую модель: на 330 км/ч это ~5.2G, на 100 км/ч это ~3G
    const aeroFactor = 1 + Math.pow(v_kmh / 300, 2); 
    const maxG = mu * aeroFactor;
    document.getElementById('gforce').innerText = maxG.toFixed(1) + " G";

    // 3. Расчет дистанции (интегральное упрощение)
    // Поскольку ускорение меняется, используем среднее замедление.
    // В F1 среднее замедление при торможении с 300 до 0 км/ч составляет около 4G.
    const avgG = (maxG + mu) / 1.8; 
    const accel = avgG * g;
    
    const distance = Math.pow(v0, 2) / (2 * accel);
    const time = v0 / accel;

    document.getElementById('dist').innerText = distance.toFixed(1) + " м";
    document.getElementById('time').innerText = time.toFixed(2) + " сек";
}

// Запуск при загрузке
calc();
</script>

</body>
</html>
